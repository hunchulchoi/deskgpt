name: Release DeskGPT

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build app bundle
        id: build
        shell: bash
        env:
          RELEASE_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail

          APP_NAME="DeskGPT"
          RELEASE_MESSAGE="${RELEASE_MESSAGE:-}"
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            RELEASE_TAG="${GITHUB_REF_NAME}"
            SHOULD_RELEASE="true"
          elif [[ "$RELEASE_MESSAGE" == release:* ]]; then
            VERSION="${RELEASE_MESSAGE#release:}"
            VERSION="${VERSION# }"
            RELEASE_TAG="v${VERSION}"
            SHOULD_RELEASE="true"
          else
            VERSION="${GITHUB_SHA::7}"
            RELEASE_TAG="desk-gpt-${VERSION}"
            SHOULD_RELEASE="false"
          fi

          BUILD_DIR="$RUNNER_TEMP/deskgpt-build"
          APP_DIR="$BUILD_DIR/$APP_NAME.app"
          RESOURCES_DIR="$APP_DIR/Contents/Resources"
          MACOS_DIR="$APP_DIR/Contents/MacOS"
          ICON_SRC="$GITHUB_WORKSPACE/.github/assets/icon.png"
          BACKGROUND_SRC="$GITHUB_WORKSPACE/.github/assets/dmg-background.png"

          ICONSET_DIR="$(mktemp -d "$RUNNER_TEMP/deskgpt-icon.XXXXXX.iconset")"
          NORMALIZED_DIR="$(mktemp -d "$RUNNER_TEMP/deskgpt-icon-src.XXXXXX")"
          SWIFT_MODULE_CACHE_DIR="$(mktemp -d "$RUNNER_TEMP/deskgpt-swift-module-cache.XXXXXX")"
          trap 'rm -rf "$ICONSET_DIR" "$NORMALIZED_DIR" "$SWIFT_MODULE_CACHE_DIR"' EXIT

          rm -rf "$BUILD_DIR"
          mkdir -p "$MACOS_DIR" "$RESOURCES_DIR"

          echo "Creating app icon..."
          if [[ -f "$ICON_SRC" ]]; then
            NORMALIZED_ICON="$NORMALIZED_DIR/source.png"
            sips -s format png "$ICON_SRC" --out "$NORMALIZED_ICON" >/dev/null

            sips -s format png -z 16 16     "$NORMALIZED_ICON" --out "$ICONSET_DIR/icon_16x16.png" >/dev/null
            sips -s format png -z 32 32     "$NORMALIZED_ICON" --out "$ICONSET_DIR/icon_16x16@2x.png" >/dev/null
            sips -s format png -z 32 32     "$NORMALIZED_ICON" --out "$ICONSET_DIR/icon_32x32.png" >/dev/null
            sips -s format png -z 64 64     "$NORMALIZED_ICON" --out "$ICONSET_DIR/icon_32x32@2x.png" >/dev/null
            sips -s format png -z 128 128   "$NORMALIZED_ICON" --out "$ICONSET_DIR/icon_128x128.png" >/dev/null
            sips -s format png -z 256 256   "$NORMALIZED_ICON" --out "$ICONSET_DIR/icon_128x128@2x.png" >/dev/null
            sips -s format png -z 256 256   "$NORMALIZED_ICON" --out "$ICONSET_DIR/icon_256x256.png" >/dev/null
            sips -s format png -z 512 512   "$NORMALIZED_ICON" --out "$ICONSET_DIR/icon_256x256@2x.png" >/dev/null
            sips -s format png -z 512 512   "$NORMALIZED_ICON" --out "$ICONSET_DIR/icon_512x512.png" >/dev/null
            sips -s format png -z 1024 1024 "$NORMALIZED_ICON" --out "$ICONSET_DIR/icon_512x512@2x.png" >/dev/null

            if ! iconutil -c icns "$ICONSET_DIR" -o "$RESOURCES_DIR/AppIcon.icns"; then
              cp /System/Library/CoreServices/CoreTypes.bundle/Contents/Resources/GenericApplicationIcon.icns \
                 "$RESOURCES_DIR/AppIcon.icns"
            fi
          else
            cp /System/Library/CoreServices/CoreTypes.bundle/Contents/Resources/GenericApplicationIcon.icns \
               "$RESOURCES_DIR/AppIcon.icns"
          fi

          cp src/Info.plist "$APP_DIR/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" "$APP_DIR/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $GITHUB_RUN_NUMBER" "$APP_DIR/Contents/Info.plist"

          SDK_PATH="$(xcrun --sdk macosx --show-sdk-path)"
          echo "Building DeskGPT.app..."
          swiftc \
            -sdk "$SDK_PATH" \
            -module-cache-path "$SWIFT_MODULE_CACHE_DIR" \
            src/DeskGPTViewController.swift \
            src/DeskGPTPDFViewController.swift \
            src/UpdateInstaller.swift \
            src/UpdateManager.swift \
            src/PreferencesWindowController.swift \
            src/AppDelegate.swift \
            src/main.swift \
            -o "$MACOS_DIR/DeskGPT" \
            -framework Cocoa -framework WebKit -framework PDFKit

          codesign --force --deep --sign - "$APP_DIR"

          DMG_STAGE_DIR="$BUILD_DIR/dmg-stage"
          DMG_PATH="$BUILD_DIR/${APP_NAME}-${VERSION}.dmg"
          rm -rf "$DMG_STAGE_DIR"
          mkdir -p "$DMG_STAGE_DIR/.background"
          cp -R "$APP_DIR" "$DMG_STAGE_DIR/"
          ln -s /Applications "$DMG_STAGE_DIR/Applications"
          cp "$BACKGROUND_SRC" "$DMG_STAGE_DIR/.background/dmg-background.png"

          hdiutil create \
            -volname "$APP_NAME" \
            -srcfolder "$DMG_STAGE_DIR" \
            -ov \
            -format UDZO \
            "$DMG_PATH"

          echo "dmg_path=$DMG_PATH" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "should_release=$SHOULD_RELEASE" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.build.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.build.outputs.release_tag }}
          name: DeskGPT ${{ steps.build.outputs.version }}
          files: ${{ steps.build.outputs.dmg_path }}
          generate_release_notes: true
